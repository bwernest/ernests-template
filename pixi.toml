[workspace]
authors = ["elaprelleboucher"]
channels = ["conda-forge"]
name = "ernests-template"
platforms = ["win-64"]
version = "0.1.0"

[dependencies]

# Python
python = "*"
numpy = "*"
lark = "*"

# Développement
autopep8 = "*"
coverage = "*"
pytest = "*"
snakeviz = "*"
tqdm = "*"

[tasks]

# Mono
main = "python main.py"
config = "python config.py"
format = "autopep8 --in-place --recursive ./"
go = "python main_dev.py"
test = "pytest engine"
testx = "pytest -s -x engine"
print_test = "pytest -s engine"

# Multi
coverage = {depends-on = ["cover_get", "cover_show"]}
perf = {depends-on = ["perf_get", "perf_show"]}
validate = {depends-on = ["format", "test", "main"]}

cover_get = "coverage run -m pytest engine"
cover_show = "coverage html"
perf_get = "python main_perf.py"
perf_show = "snakeviz profil.prof"
